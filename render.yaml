services:
  - type: web
    name: afrosec
    env: python
    region: frankfurt  # Allemagne, latence minimale
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: afrosec.onrender.com,www.afrosec.onrender.com
      - key: PORT
        value: 8000
      - key: WEB_CONCURRENCY
        value: 4
