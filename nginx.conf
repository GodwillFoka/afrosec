events {
    worker_connections 1024;
}

http {
    include mime.types;
    sendfile on;
    client_max_body_size 20M;

    upstream django {
        server web:8000;
    }

    server {
        listen 80;
        server_name afrosec.org www.afrosec.org;
        return 301 https://$server_name$request_uri;
    }

    server {
        listen 443 ssl;
        server_name afrosec.org www.afrosec.org;

        # SSL (Let's Encrypt)
        ssl_certificate /etc/letsencrypt/live/afrosec.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/afrosec.org/privkey.pem;

        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /media/;
            expires 7d;
        }

        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
